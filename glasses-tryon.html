<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Try-On</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#f5f0e8;--ink:#1a1612;--warm:#c8a96e;--glass:rgba(245,240,232,0.07);--border:rgba(200,169,110,0.25)}
    html,body{width:100%;height:100%;background:var(--ink);overflow:hidden;font-family:'Jost',sans-serif;color:var(--cream)}

    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transform:scaleX(-1)}
    #overlay{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
    #vignette{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(26,22,18,0.65) 100%)}

    #cam-gate{position:fixed;inset:0;z-index:1000;background:var(--ink);display:flex;align-items:center;justify-content:center}
    #cam-card{background:linear-gradient(145deg,#221d18,#1a1612);border:1px solid var(--border);border-radius:24px;padding:44px 36px 36px;max-width:340px;width:calc(100% - 48px);text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.6)}
    #cam-icon{width:72px;height:72px;background:rgba(200,169,110,0.12);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:30px;animation:pulse-ring 2.5s ease-in-out infinite}
    @keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(200,169,110,0.3)}50%{box-shadow:0 0 0 12px rgba(200,169,110,0)}}
    #cam-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:10px}
    #cam-title em{color:var(--warm);font-style:italic}
    #cam-desc{font-size:12px;color:rgba(245,240,232,0.5);line-height:1.7;margin-bottom:28px;letter-spacing:0.04em}
    #cam-btn{width:100%;padding:14px;background:var(--warm);color:var(--ink);border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
    #cam-btn:hover{background:#d4b87a;transform:translateY(-1px)}
    #cam-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    #cam-note{margin-top:14px;font-size:10px;color:rgba(245,240,232,0.28);letter-spacing:0.08em}
    #denied-msg{display:none;margin-top:16px;padding:12px;background:rgba(200,50,50,0.12);border:1px solid rgba(200,50,50,0.3);border-radius:10px;font-size:11px;color:#e08080;line-height:1.6}

    #loading-screen{position:fixed;inset:0;z-index:900;background:var(--ink);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 0.6s}
    #loading-screen.show{display:flex}
    #loading-screen.fade{opacity:0;pointer-events:none}
    #load-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;letter-spacing:0.1em}
    #load-title em{color:var(--warm);font-style:italic}
    #load-sub{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(245,240,232,0.38)}
    #load-bar-wrap{width:160px;height:1px;background:rgba(245,240,232,0.1);overflow:hidden}
    #load-bar{height:100%;width:0%;background:var(--warm);transition:width 0.3s ease}

    #topbar{position:fixed;top:0;left:0;right:0;z-index:10;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(26,22,18,0.88),transparent)}
    #logo{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:300;letter-spacing:0.18em;text-transform:uppercase}
    #logo span{color:var(--warm);font-style:italic}
    #status-pill{display:flex;align-items:center;gap:7px;background:var(--glass);border:1px solid var(--border);border-radius:100px;padding:5px 13px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;backdrop-filter:blur(8px)}
    #sdot{width:6px;height:6px;border-radius:50%;background:#555;transition:background 0.4s}
    #status-pill.ready #sdot{background:#7ec87e}
    #status-pill.looking #sdot{background:var(--warm);animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

    #bottom-panel{position:fixed;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(to top,rgba(26,22,18,0.96) 65%,transparent)}
    #cat-tabs{display:flex;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
    #cat-tabs::-webkit-scrollbar{display:none}
    .cat-tab{flex-shrink:0;padding:5px 14px;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;font-weight:300;cursor:pointer;border-bottom:1px solid transparent;color:rgba(245,240,232,0.4);transition:all 0.2s;white-space:nowrap}
    .cat-tab.active{color:var(--warm);border-bottom-color:var(--warm)}
    #frames-row{display:flex;gap:10px;padding:12px 16px 20px;overflow-x:auto;scrollbar-width:none}
    #frames-row::-webkit-scrollbar{display:none}
    .frame-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:9px 12px;border-radius:10px;border:1px solid transparent;background:var(--glass);backdrop-filter:blur(10px);transition:all 0.2s;min-width:64px}
    .frame-btn:hover{border-color:var(--border);transform:translateY(-2px)}
    .frame-btn.active{border-color:var(--warm);background:rgba(200,169,110,0.14)}
    .frame-icon{width:52px;height:22px;display:block}
    .frame-name{font-size:8px;font-weight:300;letter-spacing:0.14em;text-transform:uppercase;color:rgba(245,240,232,0.65)}
    .frame-btn.active .frame-name{color:var(--warm)}

    #hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;text-align:center;pointer-events:none;transition:opacity 0.5s}
    #hint.hidden{opacity:0}
    #hint-icon{font-size:40px;display:block;margin-bottom:10px;animation:float 2.5s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    #hint-text{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:rgba(245,240,232,0.6)}

    #capture-btn{position:fixed;right:20px;bottom:175px;z-index:10;width:46px;height:46px;border-radius:50%;border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;transition:all 0.2s}
    #capture-btn:hover{background:rgba(200,169,110,0.18);transform:scale(1.08)}
    #flash{position:fixed;inset:0;z-index:100;background:white;opacity:0;pointer-events:none;transition:opacity 0.08s}
    #flash.on{opacity:0.75}
  </style>
</head>
<body>

<div id="cam-gate">
  <div id="cam-card">
    <div id="cam-icon">📷</div>
    <div id="cam-title">Allow <em>Camera</em></div>
    <div id="cam-desc">To try on glasses virtually, we need your camera.<br>Your video never leaves your device.</div>
    <button id="cam-btn">Enable Camera &amp; Start</button>
    <div id="cam-note">🔒 Private — never uploaded or stored</div>
    <div id="denied-msg">Camera blocked. Click the 🔒 in your address bar → Camera → Allow → reload.</div>
  </div>
</div>

<div id="loading-screen">
  <div id="load-title">Virtual <em>Try&#8209;On</em></div>
  <div id="load-sub">Loading face tracker</div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="overlay"></canvas>
<div id="vignette"></div>
<div id="flash"></div>

<div id="topbar">
  <div id="logo">Try<span>On</span></div>
  <div id="status-pill" class="looking">
    <div id="sdot"></div>
    <span id="stxt">Loading</span>
  </div>
</div>

<div id="hint">
  <span id="hint-icon">👓</span>
  <div id="hint-text">Look into the camera</div>
</div>

<div id="capture-btn">📷</div>

<div id="bottom-panel">
  <div id="cat-tabs"></div>
  <div id="frames-row"></div>
</div>

// ── DRAW ──────────────────────────────────────────────────────────────────
function drawGlasses(ctx,frame,W,H){
  const sc=frame.big?1.16:frame.small?0.80:1;
  const lw=Math.floor(W*0.36*sc),lh=Math.floor(H*(frame.style==='goggles'?0.76:0.62)*sc);
  const cx=W/2,cy=H/2,gap=Math.floor(W*0.055);
  const l1x=cx-gap/2-lw,l2x=cx+gap/2,ly=cy-lh/2;
  ctx.strokeStyle=frame.color;ctx.fillStyle=frame.lensColor;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  function lens(x,y,w,h,s){
    ctx.beginPath();
    if(frame.style==='circle')ctx.arc(x+w/2,y+h/2,Math.min(w,h)/2,0,Math.PI*2);
    else if(frame.style==='oval')ctx.ellipse(x+w/2,y+h/2,w/2,h/2*.78,0,0,Math.PI*2);
    else if(frame.style==='cat'){if(s==='L'){ctx.moveTo(x,y+h*.72);ctx.quadraticCurveTo(x,y+h*.1,x+w*.25,y);ctx.lineTo(x+w,y-h*.18);ctx.quadraticCurveTo(x+w,y+h*.35,x+w*.7,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h*.72);}else{ctx.moveTo(x+w,y+h*.72);ctx.quadraticCurveTo(x+w,y+h*.1,x+w*.75,y);ctx.lineTo(x,y-h*.18);ctx.quadraticCurveTo(x,y+h*.35,x+w*.3,y+h);ctx.quadraticCurveTo(x+w,y+h,x+w,y+h*.72);}}
    else if(frame.style==='teardrop'){ctx.moveTo(x+w*.12,y);ctx.lineTo(x+w*.88,y);ctx.quadraticCurveTo(x+w,y,x+w,y+h*.32);ctx.quadraticCurveTo(x+w,y+h,x+w/2,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h*.32);ctx.quadraticCurveTo(x,y,x+w*.12,y);}
    else if(frame.style==='hexagon'){const r=Math.min(w,h)/2,px=x+w/2,py=y+h/2;for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);i===0?ctx.moveTo(px+r*Math.cos(a),py+r*Math.sin(a)):ctx.lineTo(px+r*Math.cos(a),py+r*Math.sin(a));}ctx.closePath();}
    else if(frame.style==='pentagon'){const r=Math.min(w,h)/2,px=x+w/2,py=y+h/2;for(let i=0;i<5;i++){const a=Math.PI/180*(72*i-90);i===0?ctx.moveTo(px+r*Math.cos(a),py+r*Math.sin(a)):ctx.lineTo(px+r*Math.cos(a),py+r*Math.sin(a));}ctx.closePath();}
    else if(frame.style==='diamond'){ctx.moveTo(x+w/2,y);ctx.lineTo(x+w,y+h/2);ctx.lineTo(x+w/2,y+h);ctx.lineTo(x,y+h/2);ctx.closePath();}
    else if(frame.style==='browline'){ctx.moveTo(x,y+h*.35);ctx.lineTo(x,y+h);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w,y+h*.35);ctx.quadraticCurveTo(x+w,y,x+w/2,y);ctx.quadraticCurveTo(x,y,x,y+h*.35);}
    else if(frame.style==='rimless'){ctx.setLineDash([3,3]);ctx.ellipse(x+w/2,y+h/2,w/2,h/2*.78,0,0,Math.PI*2);}
    else if(frame.style==='sport'){ctx.moveTo(x+w*.05,y);ctx.lineTo(x+w*.95,y);ctx.quadraticCurveTo(x+w,y,x+w,y+h*.45);ctx.lineTo(x+w*.55,y+h);ctx.lineTo(x+w*.45,y+h);ctx.lineTo(x,y+h*.45);ctx.quadraticCurveTo(x,y,x+w*.05,y);}
    else if(frame.style==='goggles')ctx.roundRect(x,y,w,h,h*.25);
    else ctx.roundRect(x,y,w,h,frame.rx||3);
    ctx.fill();ctx.stroke();ctx.setLineDash([]);
  }
  if(frame.style==='browline'){ctx.lineWidth=5.5;ctx.beginPath();ctx.moveTo(l1x,ly);ctx.quadraticCurveTo(l1x+lw/2,ly-lh*.22,l1x+lw,ly);ctx.stroke();ctx.beginPath();ctx.moveTo(l2x,ly);ctx.quadraticCurveTo(l2x+lw/2,ly-lh*.22,l2x+lw,ly);ctx.stroke();ctx.lineWidth=2.5;}
  if(frame.style==='shield'){ctx.beginPath();ctx.moveTo(l1x,ly+lh*.2);ctx.lineTo(l2x+lw,ly+lh*.2);ctx.lineTo(l2x+lw,ly+lh*.75);ctx.quadraticCurveTo(l2x+lw,ly+lh,(l1x+l2x+lw)/2,ly+lh);ctx.quadraticCurveTo(l1x,ly+lh,l1x,ly+lh*.75);ctx.closePath();ctx.fill();ctx.stroke();}
  else{lens(l1x,ly,lw,lh,'L');lens(l2x,ly,lw,lh,'R');}
  ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(l1x+lw,cy-(frame.style==='teardrop'?lh*.3:0));ctx.quadraticCurveTo(cx,cy-lh*.05,l2x,cy-(frame.style==='teardrop'?lh*.3:0));ctx.stroke();
  ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(l1x,cy);ctx.lineTo(0,cy);ctx.stroke();ctx.beginPath();ctx.moveTo(l2x+lw,cy);ctx.lineTo(W,cy);ctx.stroke();
}

function makeIcon(f){const c=document.createElement('canvas');c.width=104;c.height=40;c.className='frame-icon';drawGlasses(c.getContext('2d'),f,104,40);return c;}

// ── STATE ─────────────────────────────────────────────────────────────────
let curFrame=FRAMES[0];
let videoEl,canvasEl,ctx2d;
let lastLandmarks=null;
let ready=false;

function setSt(cls,t){document.getElementById('status-pill').className=cls;document.getElementById('stxt').textContent=t;}

// ── PLACE GLASSES ─────────────────────────────────────────────────────────
// MediaPipe FaceMesh 468 landmarks (normalized 0-1)
// Left eye: outer=33, inner=133  |  Right eye: inner=362, outer=263
// Between eyes top: 8  |  Nose bridge: 168, 6
function placeGlasses(landmarks){
  const cW=canvasEl.width, cH=canvasEl.height;

  // Get key points — landmarks are normalized [0,1]
  // Mirror x because video is CSS mirrored (scaleX(-1))
  function pt(i){
    return {
      x: (1 - landmarks[i].x) * cW,
      y: landmarks[i].y * cH
    };
  }

  // Eye corners
  const leftOuter  = pt(33);   // left eye outer corner
  const rightOuter = pt(263);  // right eye outer corner
  const leftInner  = pt(133);  // left eye inner corner
  const rightInner = pt(362);  // right eye inner corner

  // Eye center points
  const leftEyeCenter  = { x:(leftOuter.x+leftInner.x)/2,  y:(leftOuter.y+leftInner.y)/2  };
  const rightEyeCenter = { x:(rightOuter.x+rightInner.x)/2, y:(rightOuter.y+rightInner.y)/2 };

  // Width = distance between outer eye corners × scale factor
  const eyeSpan = Math.abs(rightOuter.x - leftOuter.x);
  const gW = eyeSpan * 1.5;
  const gH = gW * 0.40;

  // Center = midpoint between the two eye centers
  const cx = (leftEyeCenter.x + rightEyeCenter.x) / 2;
  const cy = (leftEyeCenter.y + rightEyeCenter.y) / 2;

  // Rotation angle
  const dx = rightEyeCenter.x - leftEyeCenter.x;
  const dy = rightEyeCenter.y - leftEyeCenter.y;
  const angle = Math.atan2(dy, dx);

  // Draw
  const off = document.createElement('canvas');
  off.width  = Math.max(1, Math.round(gW));
  off.height = Math.max(1, Math.round(gH));
  drawGlasses(off.getContext('2d'), curFrame, off.width, off.height);

  ctx2d.save();
  ctx2d.translate(cx, cy);
  ctx2d.rotate(angle);
  ctx2d.drawImage(off, -gW/2, -gH/2, gW, gH);
  ctx2d.restore();
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────
function renderLoop(){
  canvasEl.width  = window.innerWidth;
  canvasEl.height = window.innerHeight;
  ctx2d.clearRect(0,0,canvasEl.width,canvasEl.height);

  if(lastLandmarks){
    document.getElementById('hint').classList.add('hidden');
    setSt('ready','Face found');
    placeGlasses(lastLandmarks);
  } else {
    document.getElementById('hint').classList.remove('hidden');
    setSt('looking','Looking…');
  }
  requestAnimationFrame(renderLoop);
}

// ── START ─────────────────────────────────────────────────────────────────
async function startTracking(){
  videoEl  = document.getElementById('video');
  canvasEl = document.getElementById('overlay');
  ctx2d    = canvasEl.getContext('2d');

  // High quality camera
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:'user',
      width:{ideal:1920},
      height:{ideal:1080},
      frameRate:{ideal:30}
    },
    audio:false
  });
  videoEl.srcObject=stream;
  await videoEl.play();

  // MediaPipe FaceMesh
  const fm = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  fm.setOptions({
    maxNumFaces:1,
    refineLandmarks:false,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.6
  });
  fm.onResults(results=>{
    if(results.multiFaceLandmarks && results.multiFaceLandmarks.length>0){
      lastLandmarks = results.multiFaceLandmarks[0];
    } else {
      lastLandmarks = null;
    }

    // Hide loader once we get first result
    if(!ready){
      ready=true;
      document.getElementById('load-bar').style.width='100%';
      setTimeout(()=>{
        const ls=document.getElementById('loading-screen');
        ls.classList.add('fade');
        setTimeout(()=>{ls.classList.remove('show');ls.classList.remove('fade');},700);
      },400);
      setSt('looking','Looking…');
      buildUI();
      renderLoop();
    }
  });

  const mpCam = new Camera(videoEl,{
    onFrame: async()=>{ await fm.send({image:videoEl}); },
    width:1280, height:720
  });
  mpCam.start();
}

// ── UI ────────────────────────────────────────────────────────────────────
let curCat='classic';
function showCat(id){
  const row=document.getElementById('frames-row');row.innerHTML='';
  FRAMES.filter(f=>f.cat===id).forEach(f=>{
    const b=document.createElement('div');b.className='frame-btn';b.dataset.id=f.id;
    b.appendChild(makeIcon(f));
    const l=document.createElement('div');l.className='frame-name';l.textContent=f.name;b.appendChild(l);
    b.addEventListener('click',()=>{
      curFrame=f;
      document.querySelectorAll('.frame-btn').forEach(x=>x.classList.toggle('active',x.dataset.id===f.id));
    });
    row.appendChild(b);
  });
}
function buildUI(){
  const ct=document.getElementById('cat-tabs');
  CATS.forEach(c=>{
    const t=document.createElement('div');
    t.className='cat-tab'+(c.id===curCat?' active':'');
    t.textContent=c.label;
    t.addEventListener('click',()=>{
      curCat=c.id;
      document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');showCat(c.id);
    });
    ct.appendChild(t);
  });
  showCat(curCat);
}

// ── FAKE PROGRESS ─────────────────────────────────────────────────────────
let pg=0;
function fakeBar(){
  const i=setInterval(()=>{
    if(pg<85){pg+=Math.random()*8;document.getElementById('load-bar').style.width=pg+'%';}
    else clearInterval(i);
  },300);
}

// ── CAMERA GATE ───────────────────────────────────────────────────────────
document.getElementById('cam-btn').addEventListener('click',async()=>{
  const btn=document.getElementById('cam-btn'),den=document.getElementById('denied-msg');
  btn.textContent='Starting…';btn.disabled=true;
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:true});
    s.getTracks().forEach(t=>t.stop());
    document.getElementById('cam-gate').style.display='none';
    document.getElementById('loading-screen').classList.add('show');
    fakeBar();
    await startTracking();
  }catch(e){
    btn.textContent='Enable Camera & Start';btn.disabled=false;den.style.display='block';
  }
});

// ── SCREENSHOT ────────────────────────────────────────────────────────────
document.getElementById('capture-btn').addEventListener('click',()=>{
  const fl=document.getElementById('flash');
  fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),160);
  const out=document.createElement('canvas');
  out.width=window.innerWidth;out.height=window.innerHeight;
  const c=out.getContext('2d');
  c.save();c.scale(-1,1);c.drawImage(videoEl,-out.width,0,out.width,out.height);c.restore();
  c.drawImage(canvasEl,0,0);
  const a=document.createElement('a');a.download='tryon-'+Date.now()+'.png';a.href=out.toDataURL();a.click();
});

window.addEventListener('resize',()=>{
  if(canvasEl){canvasEl.width=window.innerWidth;canvasEl.height=window.innerHeight;}
});
</script>
